services:
  db:
    image: postgres:16-alpine
    container_name: imedbest_db
    environment:
      POSTGRES_DB: imedbest_dev
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: dev_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - imedbest_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d imedbest_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: imedbest_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - imedbest_network

  web:
    build:
      context: .
      target: development
    container_name: imedbest_web
    profiles: ["dev"]
    command: python src/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app                     # Bind-mount project root for hot-reloading
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev_secret_key_placeholder_for_local_env_only
      - DATABASE_URL=postgres://postgres_user:dev_password_123@db:5432/imedbest_dev
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres_user
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1  # Prevent container Python from writing bytecode back to host
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - imedbest_network

  redis:
    image: redis:7-alpine
    container_name: imedbest_redis
    ports:
      - "6379:6379"
    networks:
      - imedbest_network

  worker:
    build:
      context: .
      target: development
    container_name: imedbest_worker
    profiles: ["dev"]
    command: celery -A config worker -l info --workdir /app/src
    volumes:
      - .:/app
    environment:
      - RUN_MIGRATIONS=false
      - DEBUG=True
      - SECRET_KEY=dev_secret_key_placeholder_for_local_env_only
      - DATABASE_URL=postgres://postgres_user:dev_password_123@db:5432/imedbest_dev
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres_user
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - imedbest_network

  web-prod:
    build:
      context: .
      target: production
    container_name: imedbest_web_prod
    profiles: ["prod"]
    volumes:
      - static_volume:/app/staticfiles
    environment:
      - SECRET_KEY=prod_secret_key_placeholder
      - DATABASE_URL=postgres://postgres_user:dev_password_123@db:5432/imedbest_dev
      - ALLOWED_HOSTS=localhost,127.0.0.1,web-prod,nginx
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - imedbest_network

  worker-prod:
    build:
      context: .
      target: production
    container_name: imedbest_worker_prod
    profiles: ["prod"]
    command: celery -A config worker -l info --workdir /app/src
    environment:
      - RUN_MIGRATIONS=false
      - COLLECT_STATIC=false
      - SECRET_KEY=prod_secret_key_placeholder
      - DATABASE_URL=postgres://postgres_user:dev_password_123@db:5432/imedbest_dev
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - imedbest_network

  nginx:
    image: nginx:alpine
    container_name: imedbest_nginx
    profiles: ["prod"]
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web-prod
    networks:
      - imedbest_network

  status_agent:
    image: python:3.12-slim-bookworm
    container_name: imedbest_status_agent
    ports:
      - "8080:8080"
    volumes:
      - status_data:/data
      - ./status_agent.py:/app/status_agent.py
    command: python /app/status_agent.py
    networks:
      - imedbest_network

volumes:
  postgres_data:
  static_volume:
  status_data:
  qdrant_data:

networks:
  imedbest_network:
    driver: bridge
