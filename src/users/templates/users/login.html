<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iMedBest Login</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 24px; margin-bottom: 24px; color: #111827; }
        .btn-enterprise { background-color: #2563eb; color: white; text-decoration: none; padding: 12px 24px; border-radius: 6px; display: inline-block; font-weight: 600; transition: background-color 0.2s; }
        .btn-enterprise:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>iMedBest Enterprise</h1>
        <p style="margin-bottom: 30px; color: #4b5563;">Please sign in with your corporate account to continue.</p>
        <a href="{% url 'django_auth_adfs:login' %}" class="btn-enterprise">Enterprise Sign In</a>
    </div>
</body>
</html>
